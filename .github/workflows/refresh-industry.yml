name: Refresh Industry Data (FADA + Vahan)

on:
  workflow_dispatch: {}
  schedule:
    # Monthly: 1st of the month, 04:13 UTC.
    - cron: '13 4 1 * *'

permissions:
  contents: write

concurrency:
  group: refresh-industry
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (incl. optional cheerio for scrapers)
        run: npm ci --include=optional

      - name: Fetch FADA monthly retail
        run: node scripts/fetch-fada.mjs || echo "FADA fetch failed — JSON marked as 'error', continuing"

      - name: Fetch Vahan registrations
        run: node scripts/fetch-vahan.mjs || echo "Vahan fetch flagged — JSON marked as 'requires_browser_session', continuing"

      - name: Verify build still passes
        run: npm run build

      - name: Commit refreshed industry JSONs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/industry/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "data: refresh FADA + Vahan industry pulls (auto)"
            git push
          fi
