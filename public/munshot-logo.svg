<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#F4D27A"/>
      <stop offset="40%"  stop-color="#D9A04B"/>
      <stop offset="80%"  stop-color="#8A5618"/>
      <stop offset="100%" stop-color="#5A3408"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFF5D6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Stylised "M" — two paperclip-shaped strokes -->
  <g transform="translate(10, 18)">
    <!-- left arc -->
    <path
      d="M 12 124 L 12 36 Q 12 8 44 8 Q 76 8 76 36 L 76 124"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- right arc, slightly offset to form the M -->
    <path
      d="M 58 124 L 58 36 Q 58 8 90 8 Q 122 8 122 36 L 122 124"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- subtle vertical highlight strip -->
    <path
      d="M 12 124 L 12 36 Q 12 8 44 8 Q 76 8 76 36 L 76 124"
      fill="none"
      stroke="url(#goldHighlight)"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- "Munshot" wordmark -->
  <text
    x="160"
    y="108"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="76"
    font-weight="500"
    letter-spacing="-1.2"
    fill="#0E0E0E"
  >Munshot</text>
</svg>
